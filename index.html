<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Xperia 5 II Optimized Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --main: #10b981; --dark: #020617; --slate: #0f172a; --text: #f8fafc; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: var(--dark); color: var(--text); overflow: hidden; height: 100vh; }
        
        .viewport { position: absolute; inset: 0; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* 21:9画面を意識したスキャン枠 */
        .hud-frame {
            position: absolute; width: 220px; height: 140px; top: 40%; left: 50%; transform: translate(-50%, -50%);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 12px;
            box-shadow: 0 0 0 2000px rgba(0,0,0,0.6);
            z-index: 2;
        }
        .hud-frame::before { content: ''; position: absolute; inset: -5px; border: 4px solid var(--main); border-radius: 16px; clip-path: polygon(0 0, 25% 0, 25% 100%, 0 100%, 0 0, 100% 0, 100% 25%, 0 25%, 0 0, 100% 0, 100% 100%, 75% 100%, 75% 0, 100% 0, 100% 100%, 0 100%, 0 75%, 100% 75%, 100% 100%, 0 100%); }

        .ui { position: absolute; bottom: 0; width: 100%; z-index: 10; padding: 25px; box-sizing: border-box; background: linear-gradient(transparent, var(--dark) 30%); }
        .msg { text-align: center; height: 25px; font-size: 14px; color: var(--main); font-weight: bold; margin-bottom: 10px; }
        .total-box { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 25px; }
        .price { font-size: 52px; font-weight: 900; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .btn { border: none; border-radius: 18px; padding: 20px; font-size: 18px; font-weight: bold; cursor: pointer; color: #fff; -webkit-tap-highlight-color: transparent; }
        .btn-scan { background: var(--main); grid-column: span 3; font-size: 22px; box-shadow: 0 4px 15px rgba(16,185,129,0.3); }
        .btn-light { background: #475569; }
        .btn-pay { background: #3b82f6; }
        .btn-reset { background: #334155; }
    </style>
</head>
<body>

    <div class="viewport">
        <video id="v" autoplay playsinline></video>
        <div class="hud-frame"></div>
    </div>

    <div class="ui">
        <div id="m" class="msg"></div>
        <div class="total-box">
            <span style="color: #94a3b8; font-weight: bold;">TOTAL</span>
            <span class="price">￥<span id="t">0</span></span>
        </div>
        <div class="btn-grid">
            <button id="s" class="btn btn-scan">スキャン実行</button>
            <button id="l" class="btn btn-light"><i class="fa-solid fa-lightbulb"></i> ライト</button>
            <button id="p" class="btn btn-pay" style="display:none;">お会計</button>
            <button id="r" class="btn btn-reset">リセット</button>
        </div>
    </div>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        const v = document.getElementById('v'), c = document.getElementById('c'), ctx = c.getContext('2d');
        const tDisp = document.getElementById('t'), msg = document.getElementById('m'), sBtn = document.getElementById('s');
        let total = 0, track = null, torchOn = false;

        // Xperiaの多眼レンズからライト対応のトラックを探す
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => {
            v.srcObject = stream;
            track = stream.getVideoTracks()[0];
        });

        // ライトスイッチ
        document.getElementById('l').onclick = async () => {
            if (!track) return;
            const caps = track.getCapabilities();
            if (caps.torch) {
                torchOn = !torchOn;
                await track.applyConstraints({ advanced: [{ torch: torchOn }] });
                msg.innerText = torchOn ? "💡 ライト ON" : "💡 ライト OFF";
            } else {
                msg.innerText = "⚠️ このカメラはライト非対応です";
            }
        };

        function beep() {
            const a = new AudioContext(), o = a.createOscillator();
            o.type = 'sine'; o.frequency.value = 1100; o.connect(a.destination); o.start(); o.stop(a.currentTime + 0.08);
        }

        // 高精度スキャンの実行
        sBtn.onclick = async () => {
            sBtn.disabled = true; msg.innerText = "🔍 解析中...";
            
            const w = v.videoWidth, h = v.videoHeight;
            const sw = w * 0.35, sh = h * 0.15;
            
            // ★精度向上策: 2倍に拡大して解析
            const scale = 2;
            c.width = sw * scale; c.height = sh * scale;
            ctx.drawImage(v, (w-sw)/2, (h-sh)/2, sw, sh, 0, 0, c.width, c.height);
            
            // 赤抽出フィルター
            const id = ctx.getImageData(0,0,c.width,c.height);
            for(let i=0; i<id.data.length; i+=4) {
                let r=id.data[i], g=id.data[i+1], b=id.data[i+2];
                if(r > 120 && g < 100 && b < 100) { id.data[i]=id.data[i+1]=id.data[i+2]=0; } // 文字を黒
                else { id.data[i]=id.data[i+1]=id.data[i+2]=255; } // 背景を白
            }
            ctx.putImageData(id, 0, 0);

            try {
                const worker = await Tesseract.createWorker('eng');
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789',
                    tessedit_pageseg_mode: '7' // 1行として扱う
                });
                const { data: { text } } = await worker.recognize(c);
                const val = parseInt(text.replace(/\D/g, ""), 10);
                
                if (val > 0) {
                    beep(); total += val;
                    tDisp.innerText = total.toLocaleString();
                    document.getElementById('p').style.display = "block";
                    msg.innerText = "✅ 成功: ￥" + val;
                } else {
                    msg.innerText = "❌ 読めなかったよ（枠の中に入れてね）";
                }
                await worker.terminate();
            } catch (e) { msg.innerText = "❌ エラー"; }
            sBtn.disabled = false;
        };

        document.getElementById('r').onclick = () => location.reload();
        document.getElementById('p').onclick = () => alert(`合計 ￥${total.toLocaleString()} です。お預かりします！`);
    </script>
</body>
</html>
